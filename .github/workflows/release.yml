name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.1.0

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: domain_status-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: domain_status-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: domain_status-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: domain_status-windows-x86_64.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97
        with:
          workspaces: '.'
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked
        env:
          # For macOS cross-compilation
          MACOSX_DEPLOYMENT_TARGET: "10.13"

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/domain_status
        continue-on-error: true  # strip might not be available on all systems

      - name: Create release archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ github.workspace }}/${{ matrix.asset_name }}.tar.gz domain_status
          cd ${{ github.workspace }}

      - name: Create release archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $workspace = "${{ github.workspace }}"
          Compress-Archive -Path target/${{ matrix.target }}/release/domain_status.exe -DestinationPath "$workspace/${{ matrix.asset_name }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.zip
          if-no-files-found: error
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Get version from tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: ./artifacts

      - name: Create release notes
        id: release_notes
        run: |
          # Extract changelog section for this version
          VERSION="${{ steps.tag.outputs.VERSION }}"
          # Get changelog content for this version (between [VERSION] and next version or Unreleased)
          awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 > release_notes.txt || \
          awk "/^## \[$VERSION\]/,/^## \[Unreleased\]/" CHANGELOG.md | head -n -1 > release_notes.txt || \
          echo "Release $VERSION" > release_notes.txt
          cat release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          files: artifacts/**/*
          body_path: release_notes.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates-io:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Publish domain_status_cli to crates.io
        run: cargo publish -p domain_status_cli --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish domain_status to crates.io
        run: cargo publish -p domain_status --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Wait for release assets to be available
        run: sleep 30

      - name: Download release archives and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.tag.outputs.VERSION }}"
          BASE="https://github.com/alexwoolford/domain_status/releases/download/v${VERSION}"

          curl -sL "${BASE}/domain_status-macos-aarch64.tar.gz" -o macos-aarch64.tar.gz
          curl -sL "${BASE}/domain_status-macos-x86_64.tar.gz" -o macos-x86_64.tar.gz
          curl -sL "${BASE}/domain_status-linux-x86_64.tar.gz" -o linux-x86_64.tar.gz

          echo "SHA_MACOS_ARM=$(sha256sum macos-aarch64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "SHA_MACOS_X86=$(sha256sum macos-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "SHA_LINUX_X86=$(sha256sum linux-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: alexwoolford/homebrew-domain-status
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.tag.outputs.VERSION }}"
          cat > homebrew-tap/Formula/domain_status.rb << FORMULA
          class DomainStatus < Formula
            desc "Concurrent URL status checker that captures comprehensive metadata in SQLite"
            homepage "https://github.com/alexwoolford/domain_status"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/alexwoolford/domain_status/releases/download/v${VERSION}/domain_status-macos-aarch64.tar.gz"
                sha256 "${{ steps.sha.outputs.SHA_MACOS_ARM }}"
              else
                url "https://github.com/alexwoolford/domain_status/releases/download/v${VERSION}/domain_status-macos-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.SHA_MACOS_X86 }}"
              end
            end

            on_linux do
              url "https://github.com/alexwoolford/domain_status/releases/download/v${VERSION}/domain_status-linux-x86_64.tar.gz"
              sha256 "${{ steps.sha.outputs.SHA_LINUX_X86 }}"
            end

            def install
              bin.install "domain_status"
            end

            test do
              assert_match "domain_status", shell_output("\#{bin}/domain_status --version")
            end
          end
          FORMULA

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/domain_status.rb
          git commit -m "Update domain_status to v${{ steps.tag.outputs.VERSION }}"
          git push
