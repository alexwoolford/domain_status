[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # parquet still pulls paste transitively; remove once arrow/parquet drops or replaces it.
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
