[advisories]
ignore = [
  # rsa 0.9.10 lands in Cargo.lock via sqlx -> sqlx-mysql -> num-bigint-dig -> rsa,
  # even though we only enable sqlx's `sqlite` feature so rsa is never actually
  # compiled or linked into our binary. There is no patched version of rsa
  # (Marvin attack mitigation work is still upstream).
  # Remove once sqlx no longer pulls sqlx-mysql into the resolution graph or
  # rsa ships a constant-time fix.
  "RUSTSEC-2023-0071",
]
