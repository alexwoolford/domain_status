# Web-specific allowlists: applied after loading gitleaks.toml.
# Do not overwrite this file when refreshing upstream gitleaks.toml.
# See README for re-applying custom allowlists after upstream refresh.

[[append]]
rule_id = "sourcegraph-access-token"
regexTarget = "line"
regexes = [
    '''id="[0-9a-fA-F]{40}''',
    '''name="csrf_token"''',
    '''\?ver=[0-9a-fA-F]{40}''',
    '''thunderbolt\.[^"'\s]*[0-9a-fA-F]{40}''',
    '''writeKey\s*:\s*['"]?\d*/[0-9a-fA-F]{40}''',
    '''email-protection#''',
    '''data-cfemail=''',
    '''__cf_email__''',
    '''wp-content/uploads''',
    '''wp-image-''',
    '''_siwp_captcha''',
    '''alt="[^"]*[0-9a-fA-F]{40}''',
]

# HubSpot form/embed IDs (data-hubspot-form, data-hubspot-form-id) are public identifiers, not API keys.
[[append]]
rule_id = "hubspot-api-key"
regexTarget = "line"
regexes = [
    '''data-hubspot-form=''',
    '''data-hubspot-form-id=''',
]

# LinkedIn rules match 14/16-char alphanumeric near "linkedin"; page structure (menu-item, form name, block ID) causes false positives.
[[append]]
rule_id = "linkedin-client-id"
regexTarget = "line"
regexes = [
    '''extensionPointId''',
    '''pageJsonFileName''',
    '''interactionUrl''',
    '''menu-item#''',
    '''interactionSource''',
    '''footer-linkedin''',
]

[[append]]
rule_id = "linkedin-client-secret"
regexTarget = "line"
regexes = [
    '''extensionPointId''',
    '''pageJsonFileName''',
    '''interactionUrl''',
    '''menu-item#''',
    '''footer-linkedin''',
]

# Sumo Logic embed uses sumoSiteId (public site ID), not an access token.
[[append]]
rule_id = "sumologic-access-token"
regexTarget = "line"
regexes = [
    '''sumoSiteId''',
]

# ── Additional rules: database connection URIs with embedded credentials ──

# Detects database connection strings with embedded passwords in standard URI format.
# Covers MongoDB, PostgreSQL, MySQL, Redis, RabbitMQ (AMQP), and Elasticsearch.
# secretGroup = 2 extracts only the password portion (not the full URI).
[[rules]]
id = "database-connection-uri"
description = "Database connection string with embedded credentials (password in URI)"
regex = '''(?i)(mongodb(?:\+srv)?|postgres(?:ql)?|mysql|redis(?:s)?|amqps?|elasticsearch)://[^\s:@"'<>]+:([^\s@"'<>]{3,})@[^\s"'<>]+'''
secretGroup = 2
keywords = ["mongodb", "postgres", "postgresql", "mysql", "redis", "rediss", "amqp", "amqps", "elasticsearch"]

# Detects JDBC connection strings with embedded credentials.
# Format: jdbc:driver://host/db?user=X&password=Y or jdbc:driver://user:pass@host/db
[[rules]]
id = "jdbc-connection-string"
description = "JDBC connection string with embedded credentials"
regex = '''(?i)jdbc:(?:mysql|postgresql|oracle|sqlserver|mariadb|h2|sqlite):[^\s"'<>]*(?:password|passwd)=([^\s&;"'<>]{3,})'''
secretGroup = 1
keywords = ["jdbc"]
