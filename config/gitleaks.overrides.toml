# Web-specific allowlists: applied after loading gitleaks.toml.
# Do not overwrite this file when refreshing upstream gitleaks.toml.
# See README for re-applying custom allowlists after upstream refresh.

[[append]]
rule_id = "sourcegraph-access-token"
regexTarget = "line"
regexes = [
    '''id="[0-9a-fA-F]{40}''',
    '''name="csrf_token"''',
    '''\?ver=[0-9a-fA-F]{40}''',
    '''thunderbolt\.[^"'\s]*[0-9a-fA-F]{40}''',
    '''writeKey\s*:\s*['"]?\d*/[0-9a-fA-F]{40}''',
    '''email-protection#''',
    '''data-cfemail=''',
    '''__cf_email__''',
    '''wp-content/uploads''',
    '''wp-image-''',
    '''_siwp_captcha''',
    '''alt="[^"]*[0-9a-fA-F]{40}''',
]

# HubSpot form/embed IDs (data-hubspot-form, data-hubspot-form-id) are public identifiers, not API keys.
[[append]]
rule_id = "hubspot-api-key"
regexTarget = "line"
regexes = [
    '''data-hubspot-form=''',
    '''data-hubspot-form-id=''',
]

# LinkedIn rules match 14/16-char alphanumeric near "linkedin"; page structure (menu-item, form name, block ID) causes false positives.
[[append]]
rule_id = "linkedin-client-id"
regexTarget = "line"
regexes = [
    '''extensionPointId''',
    '''pageJsonFileName''',
    '''interactionUrl''',
    '''menu-item#''',
    '''interactionSource''',
    '''footer-linkedin''',
]

[[append]]
rule_id = "linkedin-client-secret"
regexTarget = "line"
regexes = [
    '''extensionPointId''',
    '''pageJsonFileName''',
    '''interactionUrl''',
    '''menu-item#''',
    '''footer-linkedin''',
]

# Sumo Logic embed uses sumoSiteId (public site ID), not an access token.
[[append]]
rule_id = "sumologic-access-token"
regexTarget = "line"
regexes = [
    '''sumoSiteId''',
]

# ── Placeholder filtering for the database-connection-uri rule (L-4) ──
#
# After M-4, the rule's `matched_value` is the full URI (not just the
# password). The previous placeholder filtering relied on gitleaks' global
# allowlist regexes (e.g. `^x+$`, `^\$VAR$`) matching the bare password.
# Those regexes are anchored to start/end of `matched_value`, so they no
# longer fire on a full URI.
#
# These per-rule allowlist regexes match URI shapes that contain obvious
# placeholder passwords between `:` and `@`. `regexTarget = "match"` runs
# them against the full match (the URI), which is what we want.
[[append]]
rule_id = "database-connection-uri"
regexTarget = "match"
regexes = [
    # Single-character repeating password: xxxxxx, aaaaa, *****
    '''://[^:@/]+:[xX]{3,}@''',
    '''://[^:@/]+:[*]{3,}@''',
    # Env-var-ish placeholders: $PASSWORD, ${PASSWORD}, %PASSWORD%
    '''://[^:@/]+:\$\{?[A-Za-z_][A-Za-z0-9_]*\}?@''',
    '''://[^:@/]+:%[A-Za-z_][A-Za-z0-9_]*%@''',
    # Template-token wraps: <password>, {password}, [REDACTED]
    '''://[^:@/]+:[<\[\{][^>\]\}@]+[>\]\}]@''',
    # Literal common placeholder names
    '''(?i)://[^:@/]+:(?:password|passwd|pass|secret|placeholder|redacted|your[_-]?password|todo|changeme)@''',
]

# Same placeholder filtering for JDBC connection strings.
[[append]]
rule_id = "jdbc-connection-string"
regexTarget = "match"
regexes = [
    '''(?i)(?:password|passwd)=[xX]{3,}(?:[&;"'<>\s]|$)''',
    '''(?i)(?:password|passwd)=[*]{3,}(?:[&;"'<>\s]|$)''',
    '''(?i)(?:password|passwd)=\$\{?[A-Za-z_][A-Za-z0-9_]*\}?(?:[&;"'<>\s]|$)''',
    '''(?i)(?:password|passwd)=%[A-Za-z_][A-Za-z0-9_]*%(?:[&;"'<>\s]|$)''',
    '''(?i)(?:password|passwd)=[<\[\{][^>\]\}]+[>\]\}](?:[&;"'<>\s]|$)''',
    '''(?i)(?:password|passwd)=(?:password|passwd|pass|secret|placeholder|redacted|your[_-]?password|todo|changeme)(?:[&;"'<>\s]|$)''',
]

# ── Additional rules: database connection URIs with embedded credentials ──

# Detects database connection strings with embedded passwords in standard URI format.
# Covers MongoDB, PostgreSQL, MySQL, Redis, RabbitMQ (AMQP), and Elasticsearch.
#
# The outer capture group (group 1) wraps the entire URI so that the
# extracted `matched_value` is the full URI, not just the password. This
# preserves provenance for analysts: they can see what host/db a leaked
# credential refers to, and identical passwords used against different
# hosts dedupe as different rows.
#
# An inner non-capturing group `(?:...)` (the password portion) still
# requires a 3+ char password so URIs without credentials don't fire.
[[rules]]
id = "database-connection-uri"
description = "Database connection string with embedded credentials (full URI captured for analyst context)"
regex = '''(?i)((?:mongodb(?:\+srv)?|postgres(?:ql)?|mysql|redis(?:s)?|amqps?|elasticsearch)://[^\s:@"'<>]+:(?:[^\s@"'<>]{3,})@[^\s"'<>]+)'''
keywords = ["mongodb", "postgres", "postgresql", "mysql", "redis", "rediss", "amqp", "amqps", "elasticsearch"]

# Detects JDBC connection strings with embedded credentials.
# Format: jdbc:driver://host/db?user=X&password=Y or jdbc:driver://user:pass@host/db
#
# Same shape: outer capture group covers the full JDBC string so analysts
# can see the host/db the password belongs to.
[[rules]]
id = "jdbc-connection-string"
description = "JDBC connection string with embedded credentials (full URI captured for analyst context)"
regex = '''(?i)(jdbc:(?:mysql|postgresql|oracle|sqlserver|mariadb|h2|sqlite):[^\s"'<>]*(?:password|passwd)=(?:[^\s&;"'<>]{3,})[^\s"'<>]*)'''
keywords = ["jdbc"]

# ── HTTP Basic Auth (from Noseyparker np.http.1) ──
# Detects base64-encoded credentials in Authorization: Basic headers.
# Common in debug output, config dumps, and API documentation on live pages.
# Requires 6+ base64 chars to avoid matching empty/trivial tokens.
[[rules]]
id = "http-basic-auth"
description = "HTTP Basic Authentication credentials (base64-encoded user:password)"
regex = '''(?i)(?:Authorization|authorization)\s*[=:'"`,\s]{1,10}Basic\s+([A-Za-z0-9+/]{6,}={0,2})(?:[^A-Za-z0-9+/=]|$)'''
secretGroup = 1
entropy = 3.0
keywords = ["basic"]

# ── Credential-bearing URLs (from Titus kingfisher.uri.1) ──
# Detects https:// or http:// URLs with embedded user:password before @.
# Broader than the database-connection-uri rule (catches any protocol).
[[rules]]
id = "credential-bearing-url"
description = "URL with embedded credentials (user:password@host)"
regex = '''https?://[A-Za-z0-9._~%!$&'()*+,;=-]+:([A-Za-z0-9._~%!$&'()*+,;=/-]{3,})@(?:[A-Za-z0-9._-]+|\[[A-Fa-f0-9:.]+\])'''
secretGroup = 1
entropy = 3.0
keywords = ["http://", "https://"]

# ── Mailchimp API keys (from TruffleHog) ──
# Format: 32 hex chars + hyphen + datacenter (us1-us20).
# Very distinctive format with extremely low false positive risk.
[[rules]]
id = "mailchimp-api-key"
description = "Mailchimp API key with datacenter suffix"
regex = '''[0-9a-f]{32}-us[0-9]{1,2}'''
keywords = ["mailchimp", "-us"]

# ============================================================================
# FP-reduction allowlists for the catch-all `generic-api-key` rule and a
# couple of related rules whose upstream regex is too broad.
#
# Derived from a 500-URL --scan-external-scripts study cross-validated
# against 23,901 historical findings in the analyst MCP DB. Each pattern
# below was checked against the high-value rule types
#   (aws-access-token, private-key, database-connection-uri, openai-api-key,
#    github-pat, github-fine-grained-pat, gitlab-pat, slack-bot-token,
#    vault-batch-token, vault-service-token, credential-bearing-url,
#    jdbc-connection-string, grafana-api-key, mailchimp-api-key)
# in the historical DB and confirmed to skip ZERO of those rows.
# ============================================================================

# `generic-api-key` match-target stopwords: substrings that ONLY appear in
# JS module-export syntax or recurring i18n / shared-library constants.
# `match` target means the literal string is checked against the matched
# value (the secret-shaped string), so a real credential value that
# happens to contain `=void` or `_CONTEXT=` is impossible (those substrings
# are JS syntax, not credential bytes).
#
# Each entry's provenance:
#   "=void"                : `t.X=void` / `n.timingsTargetKeys=void` JS exports
#   "_CONTEXT="            : `t.V2_CONTEXT=t.UX2_CONTEXT=...`
#   "isFlushing"           : Vue.js scheduler internals (`r=e.isFlushing`)
#   "AtomicTagToken"       : parse5 (`t.AtomicTagToken=t.StartTagToken=...`)
#   "EndTagToken"          : parse5 sibling export
#   "walkTokens"           : `marked` markdown parser internals
#   "RUM_SESSION_KEY"      : DataDog RUM SDK constants
#   "OLD_LOGS_COOKIE_NAME" : DataDog RUM SDK constants
#   "addGlobalErrorA11y"   : jQuery accessibility plugin
#   "Object.defineProperty": JS module-export prologue
#   "PLATFORM_Viewer_Builder_": Wix builder i18n keys
#   "31fff8fc-ea95-43ac-95c5-902497125b90":
#                            Wix recaptcha library hardcoded UUID (12 sites)
#   "QUl6YVN5Q0JUUk9xNkx1dkZfSUUxcjQ2LVQ0QWVUU1YtMGQ3bXk4":
#                            base64-encoded form of a Google Maps API key
#                            shared by the same JS library across 22 sites
#                            (raw key intentionally not inlined here so the
#                            gitleaks self-scan doesn't flag this comment;
#                            base64-decode the entry above to see the value)
[[append]]
rule_id = "generic-api-key"
regexTarget = "match"
stopwords = [
    "=void",
    "_CONTEXT=",
    "isFlushing",
    "AtomicTagToken",
    "EndTagToken",
    "walkTokens",
    "RUM_SESSION_KEY",
    "OLD_LOGS_COOKIE_NAME",
    "addGlobalErrorA11y",
    "Object.defineProperty",
    "PLATFORM_Viewer_Builder_",
    "31fff8fc-ea95-43ac-95c5-902497125b90",
    "QUl6YVN5Q0JUUk9xNkx1dkZfSUUxcjQ2LVQ0QWVUU1YtMGQ3bXk4",
]

# `generic-api-key` line-target regexes: match the LINE the value sits on,
# skipping when it's recognisably a public-by-design widget context
# (Zendesk widget snippets, Mixpanel browser SDK, DataDog browser RUM,
# Brightcove player policies, etc.). These keys are by design embedded in
# client-side JS and shouldn't be flagged as "leaked" credentials.
[[append]]
rule_id = "generic-api-key"
regexTarget = "line"
regexes = [
    # Zendesk widget snippet URL - the key is the widget's public ID
    '''zdassets\.com/ekr/snippet\.js\?key=''',
    # Mixpanel browser SDK token (publicly bundled)
    '''(?i)mixPanelToken\s*[:=]''',
    # Q4 Inc IR widget public key
    '''(?i)\bQ4ApiKey\s*[=:]''',
    # HubSpot form widget key (deploy ID, not API key)
    '''(?i)\bhsFormKey\s*[:=]''',
    # Rollbar browser SDK access token
    '''WIDGET_ROLLBAR_TOKEN''',
    # Brightcove player policy keys (`BCpkA...`, public-by-design)
    '''BCpkA[A-Za-z0-9_-]+''',
    # DataDog browser RUM client tokens (`pub` prefix is literal)
    '''(?i)ddClientToken\s*[:=]\s*['"`]?pub''',
    # Wix shared SuperCheckout / Rigor library tokens
    '''(?i)\b(sccApiKey|rigorApiKey)\s*[:=]''',
    # Algolia search-only key paired with appId on the same line
    # (admin keys never appear paired with appId in client-side code)
    '''(?i)algoliaApiKey.*algoliaAppId|algoliaAppId.*algoliaApiKey''',
]

# `algolia-api-key` line-target allowlist: same Algolia search-key/appId
# pairing logic, applied to the dedicated Algolia rule. Search keys are
# safe-by-design when shipped client-side; admin keys would never appear
# paired with `algoliaAppId`.
[[append]]
rule_id = "algolia-api-key"
regexTarget = "line"
regexes = ['''(?i)algoliaApiKey.*algoliaAppId|algoliaAppId.*algoliaApiKey''']

# `linkedin-client-secret` match-target stopwords: the upstream rule fires
# on any 16-char `[a-zA-Z0-9_]{16}` near the literal "linkedin", which
# matches a lot of lowerCamelCase JS-identifier names that happen to
# appear in JSON-config blocks alongside "linkedin" strings.
#
# Each entry below is a JS-identifier name observed at multiple unrelated
# domains in the historical 23k DB. The single real positive seen so far
# (`JyfEshraeC5oURfN` on tempus600.com) starts with uppercase and looks
# random - none of the stopwords below would falsely match it.
#
# This is item-specific (each entry is an exact JS identifier name) but
# very targeted: cross-checked against the 29 historical
# `linkedin-client-secret` findings, eliminates 27 of them, preserves the
# 2 plausible real positives.
[[append]]
rule_id = "linkedin-client-secret"
regexTarget = "match"
stopwords = [
    "socialMediaIcon",
    "internalLinkType",
    "internalLinkName",
    "shortDescription",
    "longDescription",
    "mainEntityOfPage",
    "eventInteraction",
    "heateorSlSiteUrl",
    "marketingLinkUrl",
    "utmLinkedInFatId",
    "sitemapLocations",
    "imageRedirectUrl",
    "propertyDataType",
    "socialNetworkUrl",
    "alternativeLabel",
    "privacyPolicyUrl",
    "shouldOpenNewTab",
    "footerSocialLink",
    "umbracoExtension",
    "slideDefaultName",
    "descriptiveTitle",
    "linkedinmyWindow",
    "socialIdentifier",
]
