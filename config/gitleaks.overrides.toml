# Web-specific allowlists: applied after loading gitleaks.toml.
# Do not overwrite this file when refreshing upstream gitleaks.toml.
# See README for re-applying custom allowlists after upstream refresh.

[[append]]
rule_id = "sourcegraph-access-token"
regexTarget = "line"
regexes = [
    '''id="[0-9a-fA-F]{40}''',
    '''name="csrf_token"''',
    '''\?ver=[0-9a-fA-F]{40}''',
    '''thunderbolt\.[^"'\s]*[0-9a-fA-F]{40}''',
    '''writeKey\s*:\s*['"]?\d*/[0-9a-fA-F]{40}''',
    '''email-protection#''',
    '''data-cfemail=''',
    '''__cf_email__''',
]
